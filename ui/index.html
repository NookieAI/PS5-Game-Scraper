<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PS5 Game Browser</title>
  <style>
    html, body { min-height: 100vh; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #000; color: #f0f0f0; }
    .container { max-width: min(1920px, 98vw); margin: 20px auto; min-height: 95vh; padding-bottom: 30px; }
    h1 { color: #fff; text-align: center; text-shadow: 0 0 15px #00d4ff; margin-bottom: 20px; }
    #status { margin-bottom: 15px; font-weight: bold; text-align: center; color: #00ff88; opacity: 0; transition: opacity 0.5s ease; }
    #status.show { opacity: 1; }
    .button-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
    .search-container { flex: 1; max-width: 300px; }
    #searchInput { padding: 10px; min-width: 180px; width: 100%; border-radius: 5px; border: 1px solid #555; background: #333; color: #fff; }
    .action-buttons { display: flex; gap: 10px; }
    button { min-width: 140px; padding: 5px 30px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
    button:hover { background: rgba(255,255,255,0.3); }
    button:disabled { background: rgba(255,255,255,0.1); cursor: not-allowed; }
    #progressRow { display: flex; flex-direction: column; align-items: flex-start; margin-bottom: 10px; }
    #progressContainer { width: 300px; visibility: hidden; }
    .progress-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; }
    .progress-bar.indeterminate::after { content: ''; display: block; height: 100%; background: linear-gradient(135deg,#00d4ff,#007bff); border-radius: 3px; animation: pw 6s infinite ease-in-out; }
    @keyframes pw { 0%{width:0%} 100%{width:100%} }
    #progressText { color: #ccc; font-size: 12px; visibility: hidden; }
    #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(clamp(100px,8vw,155px),1fr)); gap: 14px; margin-top: 10px; }
    .game-card { background: #333; border: 1px solid #555; padding: 8px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.8); cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
    .game-card:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(0,0,0,0.9); border-color: #7ab8ff55; }
    .game-title { font-size: clamp(10px,0.75vw,12px); font-weight: bold; margin-top: 6px; color: white; text-align: center; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .game-cover { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 8px; display: block; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.90); overflow-y: scroll; }
    .modal.open { display: block; }
    .modal-content { background: linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#1a1a2e 100%); margin: 40px auto 60px; border: 1px solid #2a3a5c; width: 660px; border-radius: 16px; max-width: calc(100vw - 32px); box-shadow: 0 20px 60px rgba(0,0,0,0.7); overflow: hidden; position: relative; }
    .modal-header { display: flex; flex-direction: column; align-items: center; padding: 24px 24px 18px; text-align: center; background: rgba(0,0,0,0.25); border-bottom: 1px solid #2a3a5c; }
    .modal-header .game-cover { width: 160px; height: 210px; object-fit: cover; border-radius: 12px; box-shadow: 0 8px 28px rgba(0,0,0,0.7); margin-bottom: 14px; }
    .modal-title-block { width: 100%; }
    .modal-title-block h2 { color: #e8f4ff; font-size: 1.22em; margin: 0 0 8px 0; line-height: 1.35; font-weight: 700; }
    #metaDetails { display: flex; flex-wrap: wrap; gap: 6px 8px; margin-bottom: 4px; justify-content: center; }
    .meta-badge { background: rgba(60,100,180,0.25); border: 1px solid rgba(100,150,255,0.2); border-radius: 5px; padding: 2px 8px; font-size: 0.78em; color: #99bbee; }
    .meta-badge b { color: #aaccff; margin-right: 3px; }
    .meta-badge.ppsa { background: rgba(0,80,40,0.3); border-color: rgba(0,200,100,0.25); color: #88ddbb; }
    .meta-badge.ppsa b { color: #55ddaa; }
    .close { position: absolute; top: 12px; right: 16px; background: rgba(255,255,255,0.06); border: none; color: #7788aa; font-size: 1.4em; line-height: 1; cursor: pointer; padding: 4px 9px; border-radius: 6px; transition: all 0.15s; z-index: 10; }
    .close:hover { background: rgba(255,60,60,0.2); color: #ff8888; }
    .modal-body { padding: 16px 24px 20px; }
    .modal-screenshot-row { display: flex; gap: 10px; margin: 0 0 16px 0; width: 100%; }
    .modal-screenshot-row img { flex: 1 1 0; min-width: 0; width: 0; height: 180px; border-radius: 10px; object-fit: cover; background: #111; box-shadow: 0 4px 16px rgba(0,0,0,0.5); cursor: zoom-in; transition: transform 0.15s; border: 1px solid rgba(255,255,255,0.06); }
    .modal-screenshot-row img:hover { transform: scale(1.02); border-color: rgba(100,180,255,0.3); }
    #imgLightbox { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.93); align-items: center; justify-content: center; flex-direction: column; cursor: zoom-out; }
    #imgLightbox.open { display: flex; }
    #imgLightbox img { max-width: 92vw; max-height: 92vh; min-width: min(640px,92vw); border-radius: 10px; box-shadow: 0 12px 48px rgba(0,0,0,0.9); object-fit: contain; user-select: none; }
    .lb-bar { display: flex; gap: 14px; margin-top: 16px; }
    .lb-btn { padding: 7px 22px; border-radius: 8px; border: 1px solid rgba(100,160,255,0.35); background: rgba(30,60,120,0.5); color: #b0d8ff; font-size: 0.9em; cursor: pointer; transition: all 0.15s; }
    .lb-btn:hover { background: #1a6bc4; border-color: #5599ff; color: #fff; }
    .lb-close { background: rgba(80,20,20,0.5); border-color: rgba(200,60,60,0.3); color: #ff9999; }
    .lb-close:hover { background: rgba(180,30,30,0.7); }
    #modalDesc { margin-bottom: 16px; }
    #modalDesc p { color: #8fa8c8; font-size: 0.87em; line-height: 1.7; margin: 0 0 10px 0; }
    .version-block { border: 1px solid #2a3a5c; border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
    .version-header { background: rgba(30,50,100,0.45); padding: 10px 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 10px; user-select: none; transition: background 0.15s; }
    .version-header:hover { background: rgba(40,70,140,0.55); }
    .version-title { font-size: 0.92em; font-weight: 700; color: #7ab8ff; flex: 1; }
    .version-credit-lbl { font-size: 0.75em; color: #6688aa; font-style: italic; flex-shrink: 0; }
    .version-chevron { color: #4477bb; font-size: 0.8em; transition: transform 0.2s; flex-shrink: 0; }
    .version-block.open .version-chevron { transform: rotate(180deg); }
    .version-content { display: none; padding: 12px 14px; background: rgba(0,0,0,0.18); border-top: 1px solid #1e2e4a; }
    .version-block.open .version-content { display: block; }
    .dl-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .dl-row:last-of-type { border-bottom: none; }
    .dl-row-label { font-size: 0.8em; font-weight: 700; color: #99aacc; min-width: 120px; flex-shrink: 0; line-height: 1.3; }
    .game-lbl { color: #7ddfb0; } .update-lbl { color: #7ab8ff; } .backport-lbl { color: #c0a0ff; } .dlc-lbl { color: #f0a060; }
    .dl-mirrors { display: flex; flex-wrap: wrap; gap: 5px; justify-content: flex-end; flex: 1; }
    .mirror-btn { display: inline-block; padding: 3px 11px; border-radius: 6px; background: rgba(40,60,120,0.5); color: #c5deff; border: 1px solid rgba(80,120,220,0.35); font-size: 0.8em; cursor: pointer; transition: all 0.15s; line-height: 1.6; font-weight: 500; }
    .mirror-btn:hover { background: #1a6bc4; border-color: #5599ff; color: #fff; }
    .mirror-btn.unavailable { opacity: 0.4; cursor: default; }
    .version-info { margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(255,255,255,0.07); display: flex; flex-wrap: wrap; gap: 8px 20px; }
    .info-pill { font-size: 0.78em; display: flex; align-items: flex-start; gap: 5px; line-height: 1.4; }
    .info-pill-label { color: #99aacc; font-weight: 600; flex-shrink: 0; }
    .info-pill-val { color: #b0c8e8; }
    .password-val { color: #7fe0cb !important; font-family: monospace; user-select: all; cursor: copy; letter-spacing: 0.03em; }
    .note-line { font-size: 0.78em; color: #ffe09f; margin-top: 6px; padding: 4px 8px; background: rgba(255,180,0,0.08); border-left: 2px solid rgba(255,180,0,0.3); border-radius: 3px; }
    .no-versions { color: #556677; font-size: 0.9em; text-align: center; padding: 20px; }
    #socialBar { display: flex; gap: 14px; align-items: center; justify-content: center; margin-bottom: 14px; }
    .social-link { display: inline-flex; align-items: center; gap: 5px; font-size: 0.75em; color: #556688; text-decoration: none; padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.03); transition: all 0.2s; cursor: pointer; }
    .social-link:hover { color: #aaccee; border-color: rgba(100,160,255,0.25); background: rgba(100,160,255,0.07); }
    .social-link.kofi:hover { color: #ff6c8a; border-color: rgba(255,108,138,0.3); background: rgba(255,108,138,0.07); }
    .social-link svg { flex-shrink: 0; opacity: 0.7; } .social-link:hover svg { opacity: 1; }
    @media (max-width: 768px) {
      .button-container { flex-direction: column; } .search-container { max-width: none; }
      #results { grid-template-columns: repeat(auto-fill, minmax(clamp(80px,22vw,110px),1fr)); gap: 10px; }
      .modal-content { width: 97vw; border-radius: 10px; } .modal-header { padding: 16px 14px 14px; } .modal-header .game-cover { width: 110px; height: 145px; }
      .modal-body { padding: 12px 12px 16px; } .dl-row-label { min-width: 90px; } .modal-screenshot-row img { height: 110px; }
    }
  </style>
</head>
<body>

  <div id="modal" class="modal">

  <div id="imgLightbox">
    <img id="lbImg" src="" alt="Screenshot">
    <div class="lb-bar">
      <button class="lb-btn" id="lbSave">&#10515; Save Image</button>
      <button class="lb-btn lb-close" id="lbClose">&#10005; Close</button>
    </div>
  </div>

  <script>
    // ── CONFIG ────────────────────────────────────────────────────────────────
    const CDN   = 'https://pub-d5f4def955404492b20262ad2a0dc12a.r2.dev';
    const CACHE = CDN + '/games_ps5_cache.json';
    const PCSS  = CDN + '/ui_patch.css';
    const PJS   = CDN + '/ui_patch.js';

    window.UIHooks = {};

    // ── HTTP helper — uses Tauri's HTTP client to bypass WebView2 CORS ────────
    // Native fetch() from tauri:// origin is blocked by WebView2.
    // window.__TAURI__.http.fetch() routes through Rust — no CORS restrictions.
    async function tGet(url, responseType) {
      // responseType: 1=JSON, 2=Text
      if (window.__TAURI__) {
        const r = await window.__TAURI__.http.fetch(url, { method: 'GET', responseType });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.data;
      }
      // Fallback for plain-browser dev/test
      const r = await fetch(url);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return responseType === 1 ? r.json() : r.text();
    }

    // ── Utilities ─────────────────────────────────────────────────────────────
    const escH = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    function openExternal(url) {
      if (!url || !/^https?:\/\//.test(url)) return;
      window.__TAURI__ ? window.__TAURI__.shell.open(url) : window.open(url,'_blank','noopener');
    }

    function imgUrl(local) {
      if (!local || local === 'dead') return '';
      if (/^https?:\/\//.test(local)) return local;
      return CDN + '/' + local.replace(/\\/g,'/').replace(/^screenshots_ps5\//,'');
    }
    const findCover = shots => { const s=(shots||[]).find(s=>s.role==='cover'); return s?imgUrl(s.local||s.url):''; };
    const findShots = shots => (shots||[]).filter(s=>s.role!=='cover').map(s=>imgUrl(s.local||s.url)).filter(Boolean);

    // ── Release → version object ──────────────────────────────────────────────
    function toVersion(rel, idx, extra) {
      const ppsa=(rel.ppsa||'').trim(), region=(rel.region||'').trim();
      let header;
      if (ppsa&&region) header=ppsa+' \u2014 '+region;
      else if (ppsa)    header=ppsa;
      else {
        const m=(rel.note||'').split('\n')[0].match(/PP\s*SA\s*(\d{5,8})\s*[\u2013\u2014-]\s*(\w+)/i);
        header=m?'PPSA'+m[1]+' \u2014 '+m[2].toUpperCase():'Version '+(idx+1);
      }
      const rows=[];
      if (rel.game&&rel.game.length) rows.push({label:'Game',mirrors:rel.game.map(g=>({url:g.url,text:g.label}))});
      for (const u of (rel.updates||[])) {
        rows.push({label:u.label||(u.type==='backport'?'Backport '+u.version:'Update '+u.version),mirrors:(u.filehosts||[]).map(f=>({url:f.url,text:f.label}))});
      }
      if (rel.dlc&&rel.dlc.length) rows.push({label:'DLC',mirrors:rel.dlc.map(d=>({url:d.url,text:d.label}))});
      let note=(rel.note||'').trim();
      if (/^PP\s*SA\s*\d{5,8}/i.test(note)) note=note.split('\n').slice(1).join('\n').trim();
      return {
        header, credit:(rel.contributor||'').trim(), rows,
        password:(rel.password||'').trim(),
        voice:    idx===0?(extra.voice||''):'',
        menuSubs: idx===0?(extra.subtitles||''):'',
        note,
      };
    }

    function toDetail(e, ts) {
      const x=e.extra||{};
      return {
        title:e.title||'', cover:findCover(e.screenshots), screenshots:findShots(e.screenshots),
        description:e.description||'',
        meta:{
          ppsa_ids:(x.ppsa_ids||[]).map(p=>((p.ppsa||'').trim()+' '+(p.region||'').trim()).trim()).filter(Boolean),
          genre:x.genre||'', released:x.release_year||'',
          language:x.table_language||x.language||'', game_size:x.game_size||'',
        },
        versions:(e.releases||[]).map((r,i)=>toVersion(r,i,x)),
        _ts:ts||Date.now(),
      };
    }

    // ── Cache store ───────────────────────────────────────────────────────────
    let _arr=[], _map=new Map(), _ts=0;

    async function loadCache(force) {
      if (_arr.length&&!force) return _arr;
      const a = await tGet(CACHE, 1); // 1 = JSON
      if (!Array.isArray(a)) throw new Error('Not an array');
      _arr=a; _map=new Map(a.map(e=>[e.url,e])); _ts=Date.now();
      return a;
    }

    // ── UI patches ────────────────────────────────────────────────────────────
    async function applyPatches() {
      try {
        const css = await tGet(PCSS, 2).catch(()=>null); // 2 = Text
        if (css&&css.trim()) {
          const s=document.createElement('style'); s.textContent=css; document.head.appendChild(s);
        }
      } catch {}
      try {
        const js = await tGet(PJS, 2).catch(()=>null);
        if (js&&js.trim()) {
          await new Promise(res=>{
            const b=new Blob([js],{type:'application/javascript'});
            const s=document.createElement('script');
            s.src=URL.createObjectURL(b); s.onload=res; s.onerror=res;
            document.head.appendChild(s);
          });
        }
      } catch {}
    }

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const statusEl=document.getElementById('status'),
          refreshBtn=document.getElementById('refreshBtn'),
          sortBtn=document.getElementById('sortBtn'),
          resultsEl=document.getElementById('results'),
          searchInput=document.getElementById('searchInput'),
          progressContainer=document.getElementById('progressContainer'),
          progressBar=document.getElementById('progressBar'),
          progressText=document.getElementById('progressText'),
          modal=document.getElementById('modal'),
          modalTitle=document.getElementById('modalTitle'),
          modalImage=document.getElementById('modalImage'),
          metaDetails=document.getElementById('metaDetails'),
          modalDesc=document.getElementById('modalDesc'),
          modalScreens=document.getElementById('modalScreens'),
          modalLinks=document.getElementById('modalLinks');

    let allGames=[], filtered=[], currentGame=null;
    let currentSort='title';
    try { currentSort=localStorage.getItem('ps5SortBy')||'title'; } catch {}

    const setBtns=en=>{refreshBtn.disabled=!en;sortBtn.disabled=!en;};
    const showStatus=(m,ok=true)=>{statusEl.textContent=m;statusEl.style.color=ok?'#00ff88':'#ff3870';statusEl.classList.add('show');};
    const showProg=m=>{progressContainer.style.visibility='visible';progressBar.classList.add('indeterminate');progressText.textContent=m;progressText.style.visibility='visible';};
    const hideProg=()=>{progressContainer.style.visibility='hidden';progressBar.classList.remove('indeterminate');progressText.textContent='';progressText.style.visibility='hidden';};

    function sortedList(list) {
      return currentSort==='title'
        ?list.slice().sort((a,b)=>a.title.localeCompare(b.title,undefined,{sensitivity:'base'}))
        :list.slice();
    }
    function updateSortBtn(){sortBtn.textContent=currentSort==='date'?'Sort: Title':'Sort: Date';}
    sortBtn.onclick=()=>{
      if(sortBtn.disabled)return;
      currentSort=currentSort==='date'?'title':'date';
      try{localStorage.setItem('ps5SortBy',currentSort);}catch{}
      updateSortBtn();doSearch();
    };

    function renderGames(list) {
      resultsEl.innerHTML='';
      const s=sortedList(list);
      if(!s.length){resultsEl.innerHTML='<div style="grid-column:1/-1;color:#ff3870;text-align:center;">No games found.</div>';return;}
      for(const g of s){
        const d=document.createElement('div');
        d.className='game-card';
        d.innerHTML=`<img class="game-cover" src="${escH(g.image)}" alt="${escH(g.title)}" onerror="this.style.opacity=0.15;"><div class="game-title">${escH(g.title)}</div>`;
        d.onclick=()=>showModal(g);
        resultsEl.appendChild(d);
      }
    }
    function doSearch(){
      const t=searchInput.value.trim().toLowerCase();
      filtered=t?allGames.filter(g=>g.title.toLowerCase().includes(t)):allGames.slice();
      renderGames(filtered);
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', async()=>{
      await applyPatches();
      updateSortBtn();
      document.querySelectorAll('#socialBar [data-href]').forEach(el=>
        el.addEventListener('click',e=>{e.preventDefault();openExternal(el.dataset.href);})
      );
      showProg('Loading library…');
      try {
        const arr=await loadCache();
        allGames=arr.map(e=>({url:e.url||'',title:e.title||'',image:findCover(e.screenshots)}));
        filtered=allGames.slice(); renderGames(allGames);
        showStatus('Loaded '+allGames.length+' games.');
      } catch(e) {
        showStatus('Failed to load: '+(e.message||e),false);
      } finally { hideProg(); setBtns(true); }
    });

    refreshBtn.onclick=async()=>{
      if(refreshBtn.disabled)return;
      setBtns(false);showProg('Refreshing…');
      try {
        const arr=await loadCache(true);
        allGames=arr.map(e=>({url:e.url||'',title:e.title||'',image:findCover(e.screenshots)}));
        filtered=allGames.slice();doSearch();
        showStatus('Refreshed — '+allGames.length+' games.');
      } catch(e){showStatus('Refresh failed: '+(e.message||e),false);}
      finally{hideProg();setBtns(true);}
    };
    searchInput.addEventListener('input',doSearch);

    // ── Modal ─────────────────────────────────────────────────────────────────
    const closeModal=()=>{modal.classList.remove('open');document.body.style.overflow='';};
    modal.querySelector('.close').onclick=closeModal;
    window.addEventListener('click',e=>{if(e.target===modal)closeModal();});

    function showModal(game){
      currentGame=game;
      document.body.style.overflow='hidden';
      modalTitle.textContent=game.title||'';
      modalImage.src=game.image||'';modalImage.alt=game.title||'';
      metaDetails.innerHTML='';modalDesc.innerHTML='';modalScreens.innerHTML='';
      modalLinks.innerHTML='<div style="text-align:center;color:#77aaff;padding:20px;font-size:0.9em;">Loading…</div>';
      modal.classList.add('open');
      const entry=_map.get(game.url);
      if(!entry){modalLinks.innerHTML='<div style="color:#ff7777;padding:12px;">Not found in cache.</div>';return;}
      populateModal(game,toDetail(entry,_ts));
    }

    function reopenModal(game,data){
      currentGame=game;
      if(!modal.classList.contains('open')){document.body.style.overflow='hidden';modal.classList.add('open');}
      modalTitle.textContent=data.title||game.title||'';
      if(data.cover)modalImage.src=data.cover;
      populateModal(game,data);
    }

    function populateModal(game,data){
      const els={modalTitle,modalImage,metaDetails,modalDesc,modalScreens,modalLinks,escH,openLightbox};
      if(typeof UIHooks.populateModal==='function'){UIHooks.populateModal(game,data,els);wireEvents(data);if(typeof UIHooks.afterModalPopulated==='function')UIHooks.afterModalPopulated(game,data,els);return;}

      if(data.cover)modalImage.src=data.cover;

      const meta=data.meta||{};
      if(typeof UIHooks.buildMetaBadges==='function'){metaDetails.innerHTML=UIHooks.buildMetaBadges(meta);}
      else{
        const b=[];
        (meta.ppsa_ids||[]).forEach(id=>b.push(`<span class="meta-badge ppsa"><b>PPSA</b>${escH(id)}</span>`));
        if(meta.genre)    b.push(`<span class="meta-badge"><b>Genre</b>${escH(meta.genre)}</span>`);
        if(meta.released) b.push(`<span class="meta-badge"><b>Year</b>${escH(meta.released)}</span>`);
        if(meta.language) b.push(`<span class="meta-badge"><b>Lang</b>${escH(meta.language)}</span>`);
        if(meta.game_size)b.push(`<span class="meta-badge"><b>Size</b>${escH(meta.game_size)}</span>`);
        metaDetails.innerHTML=b.join('');
      }

      modalScreens.innerHTML='';
      if(data.screenshots&&data.screenshots.length){
        const row=document.createElement('div');row.className='modal-screenshot-row';
        data.screenshots.slice(0,2).forEach(url=>{
          const img=document.createElement('img');
          img.src=url;img.title='Click to view full size';
          img.onclick=()=>openLightbox(url);
          img.onerror=()=>{img.remove();if(!row.querySelector('img'))row.remove();};
          row.appendChild(img);
        });
        modalScreens.appendChild(row);
      }

      if(typeof UIHooks.buildDescription==='function'){modalDesc.innerHTML=UIHooks.buildDescription(data);}
      else{
        modalDesc.innerHTML='';
        (data.description||'').split(/\n+/).map(s=>s.trim()).filter(Boolean).forEach(chunk=>{
          const p=document.createElement('p');p.textContent=chunk;modalDesc.appendChild(p);
        });
      }

      const versions=Array.isArray(data.versions)?data.versions:[];
      let html='';
      if(typeof UIHooks.buildVersionBlocks==='function'){html=UIHooks.buildVersionBlocks(versions,data);}
      else if(versions.length){
        versions.forEach((v,idx)=>{
          const credit=v.credit?`<span class="version-credit-lbl">${escH(v.credit)}</span>`:'';
          let rows='';
          (v.rows||[]).forEach(row=>{
            const ll=(row.label||'').toLowerCase();
            let lc='class="dl-row-label"';
            if(ll==='game')lc='class="dl-row-label game-lbl"';
            else if(ll==='dlc')lc='class="dl-row-label dlc-lbl"';
            else if(/backport/.test(ll))lc='class="dl-row-label backport-lbl"';
            else if(/update/.test(ll))lc='class="dl-row-label update-lbl"';
            const mirrors=(row.mirrors||[]).map(m=>m.url
              ?`<button class="mirror-btn" data-href="${escH(m.url)}">${escH(m.text)}</button>`
              :`<span class="mirror-btn unavailable">${escH(m.text)}</span>`
            ).join('');
            rows+=`<div class="dl-row"><span ${lc}>${escH(row.label)}</span><div class="dl-mirrors">${mirrors}</div></div>`;
          });
          let pills='';
          if(v.password)pills+=`<div class="info-pill"><span class="info-pill-label">🔑 Password</span><span class="info-pill-val password-val" title="Click to copy" onclick="navigator.clipboard.writeText(this.textContent)">${escH(v.password)}</span></div>`;
          if(idx===0&&v.voice)pills+=`<div class="info-pill"><span class="info-pill-label">🔊 Voice</span><span class="info-pill-val">${escH(v.voice)}</span></div>`;
          if(idx===0&&v.menuSubs)pills+=`<div class="info-pill"><span class="info-pill-label">💬 Subtitles</span><span class="info-pill-val">${escH(v.menuSubs)}</span></div>`;
          const info=pills?`<div class="version-info">${pills}</div>`:'';
          const note=v.note?`<div class="note-line">${escH(v.note)}</div>`:'';
          html+=`<div class="version-block ${idx===0?'open':''}">
            <div class="version-header"><span class="version-title">${escH(v.header)}</span>${credit}<span class="version-chevron">&#9660;</span></div>
            <div class="version-content">${rows}${info}${note}</div>
          </div>`;
        });
      } else { html='<div class="no-versions">No download links found.</div>'; }

      modalLinks.innerHTML=html;
      wireEvents(data);
      if(typeof UIHooks.afterModalPopulated==='function')UIHooks.afterModalPopulated(game,data,els);
    }

    function wireEvents(data){
      const ts=data._ts?new Date(data._ts).toLocaleString():'';
      const bar=document.createElement('div');
      bar.style.cssText='display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.07);font-size:0.75em;color:#667799;';
      bar.innerHTML=`<span>Loaded: ${escH(ts)}</span><button id="reloadBtn" style="padding:3px 10px;border-radius:6px;background:rgba(30,60,120,0.6);color:#99ccff;border:1px solid rgba(80,130,220,0.4);cursor:pointer;font-size:1em;">&#8635; Reload</button>`;
      modalLinks.appendChild(bar);
      document.getElementById('reloadBtn').onclick=async()=>{
        bar.innerHTML='<span style="color:#aabbcc;">Reloading…</span>';
        try{await loadCache(true);const e=_map.get(currentGame.url);if(!e)throw new Error('Not found');reopenModal(currentGame,toDetail(e,_ts));}
        catch(e){bar.innerHTML=`<span style="color:#ff6666;">Failed: ${escH(e.message)}</span>`;}
      };
      modalLinks.querySelectorAll('.version-header').forEach(h=>h.onclick=()=>h.closest('.version-block').classList.toggle('open'));
      modalLinks.querySelectorAll('[data-href]').forEach(btn=>{
        btn.onclick=e=>{e.stopPropagation();e.preventDefault();openExternal(btn.getAttribute('data-href'));};
      });
    }

    // ── Lightbox ──────────────────────────────────────────────────────────────
    const lightbox=document.getElementById('imgLightbox'),lbImg=document.getElementById('lbImg');
    const openLightbox=url=>{lbImg.src=url;lightbox.classList.add('open');};
    const closeLightbox=()=>{lightbox.classList.remove('open');lbImg.src='';};
    lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeLightbox();});
    document.getElementById('lbClose').addEventListener('click',e=>{e.stopPropagation();closeLightbox();});
    document.getElementById('lbSave').addEventListener('click',e=>{
      e.stopPropagation();
      const a=document.createElement('a');a.href=lbImg.src;
      a.download=lbImg.src.split('/').pop().split('?')[0]||'screenshot.jpg';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
    });
    document.addEventListener('keydown',e=>{
      if(e.key!=='Escape')return;
      if(lightbox.classList.contains('open')){e.stopPropagation();closeLightbox();}
      else if(modal.classList.contains('open'))closeModal();
    });
  </script>
</body>
</html>
