name: Build PS5 Game Browser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust/Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1" --locked

      - name: Build Windows
        run: cargo tauri build
        working-directory: src-tauri

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Windows portable exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: src-tauri/target/release/ps5-game-browser.exe
          if-no-files-found: error

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-mac:
    strategy:
      matrix:
        include:
          - arch: x86_64-apple-darwin
            label: intel
            runner: macos-13        # last Intel runner
          - arch: aarch64-apple-darwin
            label: apple-silicon
            runner: macos-latest    # arm64

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch }}

      - name: Cache Rust/Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: mac-${{ matrix.label }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: mac-${{ matrix.label }}-cargo-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1" --locked

      - name: Build macOS (${{ matrix.label }})
        run: cargo tauri build --target ${{ matrix.arch }}
        working-directory: src-tauri

      - name: Upload macOS dmg (${{ matrix.label }})
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-${{ matrix.label }}
          path: src-tauri/target/${{ matrix.arch }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload macOS app (${{ matrix.label }})
        uses: actions/upload-artifact@v4
        with:
          name: mac-app-${{ matrix.label }}
          path: src-tauri/target/${{ matrix.arch }}/release/bundle/macos/*.app.tar.gz
          if-no-files-found: warn   # .app.tar.gz may not always be generated

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.0-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust/Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1" --locked

      - name: Build Linux
        run: cargo tauri build
        working-directory: src-tauri

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload Linux deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List release files
        run: find release-files -type f

      - name: Set release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: PS5 Game Browser ${{ steps.tag.outputs.tag }}
          files: release-files/**/*
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
